<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetPhoneHub.com</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <!-- 先加载配置文件 -->
    <script src="config/common-config.js"></script>
    <script src="config/index-config.js"></script>
    
    <!-- 头部导航 -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    <i class="fas fa-mobile-alt"></i>
                    <span>GetPhoneHub</span>
                </a>
                <div class="nav-links">
                    <!-- 导航菜单将通过JS动态生成 -->
                </div>
                <div class="auth-buttons">
                    <button class="btn-user" onclick="showUserMenu(event)">
                        <i class="fas fa-user"></i>
                    </button>
                    <!-- 用户菜单 -->
                    <div class="user-menu" id="userMenu">
                        <a href="#" onclick="showModal('login'); return false;">登录</a>
                        <a href="#" onclick="showModal('register'); return false;">注册</a>
                    </div>
                    <!-- 客服链接 -->
                    <a href="#" class="customer-service" onclick="showCustomerModal(); return false;">
                        <i class="fas fa-headset"></i>
                        <span class="desktop-only">客服</span>
                    </a>
                    <!-- 移动端菜单按钮 -->
                    <button class="mobile-menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </nav>
        </div>
    </header>
    
    <!-- 移动端菜单 -->
    <div class="mobile-menu">
        <div class="mobile-menu-header">
            <h3>菜单</h3>
            <button class="mobile-menu-close">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="mobile-menu-links">
            <!-- 移动端菜单项将通过JS动态生成 -->
        </div>
    </div>
    <div class="mobile-menu-overlay"></div>
    
    <!-- 主要内容 -->
    <main>
        <!-- 海报区域 -->
        <section class="banner">
            <div class="banner-content">
                <h1 class="banner-title"></h1>
                <p class="banner-subtitle"></p>
                <a href="#" class="banner-button"></a>
            </div>
        </section>
        
        <!-- 产品展示区域 -->
        <section class="products">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="product-grid">
                    <!-- 产品卡片将通过JS动态生成 -->
                </div>
            </div>
        </section>
    </main>
    
    <!-- 页脚 -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>联系我们</h3>
                    <div class="footer-contact">
                        <!-- 联系方式将通过JS动态生成 -->
                    </div>
                </div>
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <p>GetPhoneHub是您值得信赖的手机购买平台，提供最新、最全面的手机产品信息。</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p class="footer-copyright"></p>
            </div>
        </div>
    </footer>
    
    <!-- 登录模态框 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('login')">&times;</span>
            <h2>登录</h2>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <input type="text" id="loginAccount" placeholder="手机号/邮箱" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码" required>
                </div>
                <div class="form-group remember-me">
                    <label>
                        <input type="checkbox" id="rememberMe"> 记住密码
                    </label>
                </div>
                <button type="submit" class="btn-primary">登录</button>
                <div class="switch-form">
                    <span>还没有账号？</span>
                    <a href="#" onclick="switchForm('register'); return false;">立即注册</a>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 注册模态框 -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('register')">&times;</span>
            <h2>注册</h2>
            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <input type="text" id="registerAccount" placeholder="手机号/邮箱" required>
                </div>
                <div class="form-group">
                    <input type="password" id="registerPassword" placeholder="密码" required>
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" placeholder="确认密码" required>
                </div>
                <button type="submit" class="btn-primary">注册</button>
                <div class="switch-form">
                    <span>已有账号？</span>
                    <a href="#" onclick="switchForm('login'); return false;">立即登录</a>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 客服模态框 -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCustomerModal()">&times;</span>
            <h2>联系客服</h2>
            <div class="customer-info">
                <p>在线时间：<span id="customerWorkTime"></span></p>
                <p>客服热线：<span id="customerPhone"></span></p>
                <p>邮箱：<span id="customerEmail"></span></p>
                <p>WhatsApp：<span id="customerWhatsapp"></span></p>
            </div>
            <form id="messageForm" onsubmit="return handleMessage(event)">
                <div class="form-group">
                    <input type="text" id="contactInfo" placeholder="请输入您的手机号/邮箱" required>
                </div>
                <div class="form-group">
                    <textarea id="messageContent" placeholder="请描述您的问题..." rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-primary">提交留言</button>
            </form>
        </div>
    </div>
    
    <!-- 脚本 -->
    <script src="js/common.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
